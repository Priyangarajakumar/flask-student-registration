<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body{
            background:url("/static/signup_bg.jpg") no-repeat center center fixed;
            background-size: cover;
        }
        .container{
            width: 350px;
            margin: 100px auto;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
            text-align: center;
        }
        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn{
            width: 100%;
            background: #09c3c3;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .error{ color: red; }
    </style>
</head>
<body>
<div class="container">
    <h2>Sign Up</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/signup" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="submit" value="Sign Up" class="btn">
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
</div>
</body>
</html>
