<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
           /* background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center fixed;*/
           background:url("/static/images.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .container{
            width: 500px;
            margin: 40px auto;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        h2{
            text-align: center;
            color: #007BFF;
        }

        label{
            font-weight: bold;
        }

        input, select, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn{
            width: 100%;
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover{
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form action="/submit" method="POST">

        <label>Name</label>
        <input type="text" name="name">

        <label>Email</label>
        <input type="email" name="email">

        <label>Mobile</label>
        <input type="text" name="mobile">

        <label>Alternate Mobile</label>
        <input type="text" name="alternate_mobile">

        <label>Date of Birth</label>
        <input type="date" name="date_of_birth">

        <label>Age</label>
        <input type="number" name="age">

        <label>Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>City</label>
        <input type="text" name="city">

        <label>State</label>
        <input type="text" name="state">

        <label>Country</label>
        <input type="text" name="country">

        <label>Pincode</label>
        <input type="text" name="pincode">

        <label>Qualification</label>
        <input type="text" name="qualification">

        <label>College</label>
        <input type="text" name="college">
        
        <label>Department</label>
        <input type="text" name="department">
        
        <label>Course</label>
        <input type="text" name="course">
        
        <label>Year of Passout</label>
        <input type="text" name="year">
        
        <label>CGPA</label>
        <input type="text" name="cgpa">
        
        <label>Languages Known</label>
        <input type="text" name="languages">

        <label>Skills</label>
        <textarea name="skills"></textarea>
        
        <label>Blood Group</label>
        <input type="text" name="blood_group">
        
        <label>Emergency Contact</label>
        <input type="text" name="emergency_contact">
        
        <label>Guardian Name</label>
        <input type="text" name="guardian_name">

        <input type="submit" value="Register" class="btn">

    </form>

</div>

</body>
</html>
